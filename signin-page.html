<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Sign-in</title>
    <link rel="icon" href="image/amazon-server-logo.jpg">
    <link rel="stylesheet" href="signin.css" />
  </head>
  <body>
    <div class="signin-img">
      <img src="image/amazon-logo-black.png" alt="" />
    </div>
    <form action="#">
      <div class="sign-form">
        <h5>Sign in or create account</h5>
        <div class="signin-btn">
          <label for="text">Enter mobile number or email</label>
          <input type="text" />
          <button>Continue</button>
        </div>

        <div class="signin-paragraph">
          <p>
            By continuing, you agree to Amazon's
            <a href="#"
              >Conditions <br />
              of Use</a
            >
            and <a href="#">Privacy Notice.</a>
          </p>
        </div>
        <a class="need-signin" href="#">Need help?</a>
        <hr class="hr" />

        <span class="buying-text">Buying for work?</span>
        <a class="signin-b-account" href="#">
          <span>Create a free business account</span>
        </a>
      </div>
    </form>

    <hr class="hr2" />
    <div class="signin-help">
      <a href="#"> Conditions of Use </a>
      <a href="#"> Privacy Notice </a>
      <a href="#">Help</a>
    </div>
    <p class="help-p">© 1996-2026, Amazon.com, Inc. or its affiliates</p>
  </body>
</html>
